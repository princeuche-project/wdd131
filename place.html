<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Uchenna Godstime Owuamanam" />
    <meta name="description" content="This page is to talk about Nigeria and its weather condition " />
    <title>Nigeria Place Page</title>

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Nigeria</h1>
    </header>

    <main>

        <section class="hero">
            <picture>
                <source srcset="images/hero-image (1).webp" media="(min-width: 768px)">
                <img src="images/hero-image (2).webp" alt="Beautiful scenery of Nigeria">
            </picture>
        </section>

        <section class="content">

            <div class="card">
                <h2>Data</h2>

                <p><strong>Area:</strong> 923,768 sq km</p>
                <p><strong>Population:</strong> 223 million</p>
                <p><strong>Capital:</strong> Abuja</p>
                <p><strong>Languages:</strong> English, Hausa, Igbo, Yoruba</p>
                <p><strong>Currency:</strong> Naira</p>
                <p><strong>Time Zone:</strong> UTC+1</p>
            </div>

            <div class="card weather">
                <h2>Weather</h2>

                <img src="images/weather.svg" alt="Weather Icon" class="weather-icon">

                <p><strong>Temperature:</strong> <span id="temperature">8</span> °C</p>
                <p><strong>Conditions:</strong> Cloudy</p>
                <p><strong>Wind:</strong> <span id="windspeed">10</span> km/h</p>
                <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
            </div>

        </section>

    </main>

    <footer>
        <p>
            © <span id="currentyear"></span> 🌍 Nigeria 🌍
        </p>

        <p id="lastModified"></p>
    </footer>

</body>

</html>
