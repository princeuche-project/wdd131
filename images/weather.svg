<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"></stop>
      <stop offset="100%" stop-color="#FFB300"></stop>
    </linearGradient>

    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="100%" stop-color="#CFD8DC"></stop>
    </linearGradient>
  </defs>

  <!-- Sun -->
  <circle cx="70" cy="70" r="28" fill="url(#sunGradient)"></circle>

  <!-- Sun Rays -->
  <g stroke="#FFC107" stroke-width="4" stroke-linecap="round">
    <line x1="70" y1="22" x2="70" y2="8"></line>
    <line x1="70" y1="132" x2="70" y2="118"></line>
    <line x1="22" y1="70" x2="8" y2="70"></line>
    <line x1="132" y1="70" x2="118" y2="70"></line>

    <line x1="38" y1="38" x2="28" y2="28"></line>
    <line x1="102" y1="102" x2="112" y2="112"></line>
    <line x1="38" y1="102" x2="28" y2="112"></line>
    <line x1="102" y1="38" x2="112" y2="28"></line>
  </g>

  <!-- Cloud -->
  <g fill="url(#cloudGradient)">
    <circle cx="105" cy="105" r="26"></circle>
    <circle cx="135" cy="95" r="32"></circle>
    <circle cx="165" cy="108" r="24"></circle>
    <rect x="85" y="108" width="100" height="35" rx="18"></rect>
  </g>

  <!-- Rain -->
  <g stroke="#29B6F6" stroke-width="4" stroke-linecap="round">
    <line x1="110" y1="150" x2="102" y2="168"></line>
    <line x1="140" y1="150" x2="132" y2="168"></line>
    <line x1="170" y1="150" x2="162" y2="168"></line>
  </g>
</svg>