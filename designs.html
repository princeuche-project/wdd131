<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Card Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f4f1eb, #d9cbb6);
            padding: 20px;
        }

        .card {
            width: 350px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .card-image {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover .card-image img {
            transform: scale(1.08);
        }

        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #111;
            color: #fff;
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .badge a {
            text-justify: auto;
            text-decoration: none;
            color: #333;
            width: 100%;
            background-color: wheat;
            border-radius: 5px;
            font-size: large;
            transition: all 0.3s ease;


        }

        .badge a:hover {
            background-color: #000;
            color: #f4f1eb;
            transform: scale(1.05);

        }

        .card-content {
            padding: 24px;
        }

        .card-title {
            font-size: 1.6rem;
            color: #1f1f1f;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #666;
            margin-bottom: 22px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #111;
        }

        .btn {
            text-decoration: none;
            background: linear-gradient(135deg, #111, #444);
            color: white;
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(135deg, #333, #000);
            transform: scale(1.05);
        }

        @media (max-width: 400px) {
            .card {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="card-image">
            <img src="images/stellap.png" alt="Luxury Fashion">
            <div class="badge">
                <h1>NEW COLLECTION</h1>
                <a href="stellas.html"> Stella Card</a>
            </div>
        </div>

        <div class="card-content">
            <h2 class="card-title">S'MARIS DESIGNS</h2>

            <p class="card-text">
                Discover elegance and sophistication with our refined fashion collection crafted for confidence, beauty,
                and timeless luxury.
            </p>

            <div class="card-footer">
                <span class="price">Luxury Style</span>
                <a href="collection.html" class="btn">Explore</a>
            </div>
        </div>
    </div>

</body>

</html>
